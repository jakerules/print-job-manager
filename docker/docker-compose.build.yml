# Build-from-source compose (no registry login needed)
# ====================================================
# Docker pulls the source code directly from GitHub and builds locally.
# Use this if you can't pull from GHCR (private packages).
#
#   curl -O https://raw.githubusercontent.com/jakerules/print-job-manager/master/docker/docker-compose.build.yml
#   docker compose -f docker-compose.build.yml up -d

services:
  backend:
    build:
      context: https://github.com/jakerules/print-job-manager.git#master
      dockerfile: docker/Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-5080}:5000"
    volumes:
      - ./database:/data/db
      - ./uploads:/app/uploads
      # Uncomment BOTH lines below for Google Sheets integration:
      # - ./config:/app/config:ro
      # - ./credentials.json:/app/web_app/credentials.json:ro
    environment:
      - FLASK_ENV=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - RESET_ADMIN_PASSWORD=${RESET_ADMIN_PASSWORD:-}
      - TZ=${TZ:-America/New_York}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: https://github.com/jakerules/print-job-manager.git#master
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-9080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
