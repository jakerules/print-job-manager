# Print Job Manager — Docker Compose
#
# Quick start (build from source):
#   docker compose build && docker compose up -d
#
# Or pull pre-built images from GHCR (if available):
#   docker compose pull && docker compose up -d
#
# Optional — Google Sheets integration:
#   mkdir -p config && cp your-config.ini config/config.ini
#   cp your-credentials.json credentials.json
#   Then uncomment the two volume lines below and restart.

services:
  backend:
    image: ghcr.io/jakerules/print-job-manager/backend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - db-data:/data/db
      - uploads:/app/uploads
      # Uncomment BOTH lines below for Google Sheets integration:
      # - ${CONFIG_DIR:-./config}:/app/config:ro
      # - ${CREDENTIALS_FILE:-./credentials.json}:/app/web_app/credentials.json:ro
    environment:
      - FLASK_ENV=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - RESET_ADMIN_PASSWORD=${RESET_ADMIN_PASSWORD:-}
      - TZ=${TZ:-America/New_York}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    image: ghcr.io/jakerules/print-job-manager/frontend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
  uploads:
