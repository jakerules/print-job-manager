version: "3.8"

# Pull pre-built images from GitHub Container Registry.
# No build step needed — just run:
#   docker compose up -d
#
# To connect Google Sheets, create these files next to docker-compose.yml:
#   config/config.ini    — copy settings from the repo's backend/config/config.ini.example
#   credentials.json     — your Google Service Account key

services:
  backend:
    image: ghcr.io/jakerules/print-job-manager/backend:latest
    ports:
      - "5000:5000"
    volumes:
      - db-data:/app/database
      - uploads:/app/uploads
      - ${CONFIG_DIR:-./config}:/app/config:ro
      - ${CREDENTIALS_FILE:-./credentials.json}:/app/web_app/credentials.json:ro
    environment:
      - FLASK_ENV=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    image: ghcr.io/jakerules/print-job-manager/frontend:latest
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
  uploads:
