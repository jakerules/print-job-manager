version: "3.8"

# TrueNAS SCALE docker-compose
# =============================
# 1. Create a dataset for app data, e.g.: /mnt/pool/apps/print-job-manager
# 2. Place this file there along with credentials (optional)
# 3. Run:  docker compose up --build -d
#
# Directory layout:
#   /mnt/pool/apps/print-job-manager/
#   ├── docker-compose.yml      ← this file
#   ├── database/               ← created automatically (SQLite)
#   ├── uploads/                ← created automatically (file uploads)
#   ├── credentials.json        ← optional: Google Service Account key
#   └── config/
#       └── config.ini          ← optional: Google Sheets settings

services:
  backend:
    build:
      context: https://github.com/jakerules/print-job-manager.git#master
      dockerfile: docker/Dockerfile.backend
    ports:
      - "5080:5000"
    volumes:
      # Use host paths on ZFS dataset so data persists across rebuilds
      - ./database:/app/database
      - ./uploads:/app/uploads
      # Optional: Google Sheets integration
      - ./config:/app/config:ro
      - ./credentials.json:/app/web_app/credentials.json:ro
    environment:
      - FLASK_ENV=production
      # IMPORTANT: Set a fixed secret so JWT tokens survive restarts
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-CHANGE-ME-use-a-random-string-here}
      - TZ=${TZ:-America/New_York}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: https://github.com/jakerules/print-job-manager.git#master
      dockerfile: docker/Dockerfile.frontend
    ports:
      # Port 9080 to avoid conflict with TrueNAS web UI on 80/443
      - "9080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
