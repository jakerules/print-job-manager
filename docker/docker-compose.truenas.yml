# TrueNAS SCALE docker-compose
# =============================
# For use with TrueNAS Apps → Custom App (Docker Compose).
# Paste this into the compose editor or place in the app dataset.
#
# 1. In TrueNAS: Apps → Discover → Custom App
# 2. Paste this compose config
# 3. App will be at http://<truenas-ip>:9080
#
# NOTE: TrueNAS Apps only supports pulling images (no build).
# If GHCR images are outdated, build and push from a workstation first,
# or use the TrueNAS CLI directly with docker-compose.build.yml.
#
# Google Sheets integration is configured entirely from the web UI
# (App Settings page). No file mounts needed.

services:
  backend:
    image: ghcr.io/jakerules/print-job-manager/backend:latest
    ports:
      - "5080:5000"
    volumes:
      - ./database:/data/db
      - ./uploads:/app/uploads
    environment:
      - FLASK_ENV=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - RESET_ADMIN_PASSWORD=${RESET_ADMIN_PASSWORD:-}
      - TZ=${TZ:-America/New_York}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    image: ghcr.io/jakerules/print-job-manager/frontend:latest
    ports:
      - "9080:80"
    depends_on:
      - backend
    restart: unless-stopped
