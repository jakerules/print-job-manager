# TrueNAS SCALE docker-compose
# =============================
# 1. Place this file in /mnt/HDDs/Applications/print-job-manager/
# 2. Run:  docker compose up -d
# 3. App will be at http://<truenas-ip>:9080
#
# To build from source instead of pulling GHCR images:
#   docker compose build --no-cache && docker compose up -d
#
# Optional — Google Sheets integration:
#   mkdir -p config && cp config.ini config/ && cp credentials.json .
#   Then uncomment the two volume lines below and restart.

services:
  backend:
    image: ghcr.io/jakerules/print-job-manager/backend:latest
    build:
      context: https://github.com/jakerules/print-job-manager.git#master
      dockerfile: docker/Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-5080}:5000"
    volumes:
      - ./database:/data/db
      - ./uploads:/app/uploads
      # Uncomment BOTH lines below for Google Sheets integration:
      # - ./config:/app/config:ro
      # - ./credentials.json:/app/web_app/credentials.json:ro
    environment:
      - FLASK_ENV=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - RESET_ADMIN_PASSWORD=${RESET_ADMIN_PASSWORD:-}
      - TZ=${TZ:-America/New_York}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    image: ghcr.io/jakerules/print-job-manager/frontend:latest
    build:
      context: https://github.com/jakerules/print-job-manager.git#master
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-9080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
